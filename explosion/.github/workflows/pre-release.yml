name: Pre-release (unstable)

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        run: |
          curl -sL "https://github.com/adoptium/temurin26-binaries/releases/download/jdk-26.0.1%2B8/OpenJDK26U-jdk_x64_linux_hotspot_26.0.1_8.tar.gz" -o /tmp/jdk26.tar.gz
          sudo mkdir -p /opt/jdk26 && sudo tar -xzf /tmp/jdk26.tar.gz -C /opt/jdk26 --strip-components=1
          echo "JAVA_HOME=/opt/jdk26" >> $GITHUB_ENV
          echo "/opt/jdk26/bin" >> $GITHUB_PATH

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -Pmod_version=unstable-${GITHUB_SHA::8}

      - name: Delete old unstable tag
        run: git push origin :refs/tags/unstable || true

      - name: Create unstable tag
        run: |
          git tag -f unstable
          git push origin unstable --force

      - name: Delete old unstable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete unstable --yes --cleanup-tag || true

      - name: Verify artifacts
        run: |
          echo "=== Fabric JARs ==="
          ls -la build/libs/

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create unstable
          build/libs/explosion-parallelization-*.jar
          --prerelease
          --title "Unstable Build"
          --notes "Automated pre-release from branch ${{ github.ref_name }} (commit ${{ github.sha }})."
