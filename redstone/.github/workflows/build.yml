name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk 26
        run: |
          curl -sL "https://github.com/adoptium/temurin26-binaries/releases/download/jdk-26.0.1%2B8/OpenJDK26U-jdk_x64_linux_hotspot_26.0.1_8.tar.gz" -o /tmp/jdk26.tar.gz
          sudo mkdir -p /opt/jdk26 && sudo tar -xzf /tmp/jdk26.tar.gz -C /opt/jdk26 --strip-components=1
          echo "JAVA_HOME=/opt/jdk26" >> $GITHUB_ENV
          echo "/opt/jdk26/bin" >> $GITHUB_PATH
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: build/libs/
