name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 26
        run: |
          curl -sL "https://github.com/adoptium/temurin26-binaries/releases/download/jdk-26.0.1%2B8/OpenJDK26U-jdk_x64_linux_hotspot_26.0.1_8.tar.gz" -o /tmp/jdk26.tar.gz
          sudo mkdir -p /opt/jdk26 && sudo tar -xzf /tmp/jdk26.tar.gz -C /opt/jdk26 --strip-components=1
          echo "JAVA_HOME=/opt/jdk26" >> $GITHUB_ENV
          echo "/opt/jdk26/bin" >> $GITHUB_PATH
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew build -Pmod_version=$(git rev-parse --short HEAD)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vectorial
          path: build/libs/vectorial-*.jar
