name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: false
        type: choice
        default: "release"
        options: [release, beta, alpha]

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Set up JDK 26
        run: |
          curl -sL "https://github.com/adoptium/temurin26-binaries/releases/download/jdk-26.0.1%2B8/OpenJDK26U-jdk_x64_linux_hotspot_26.0.1_8.tar.gz" -o /tmp/jdk26.tar.gz
          sudo mkdir -p /opt/jdk26 && sudo tar -xzf /tmp/jdk26.tar.gz -C /opt/jdk26 --strip-components=1
          echo "JAVA_HOME=/opt/jdk26" >> $GITHUB_ENV
          echo "/opt/jdk26/bin" >> $GITHUB_PATH

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -Pmod_version=${{ inputs.version }}

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" --reverse)
          else
            LOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %s" --reverse)
          fi
          {
            echo "### Features"
            echo "$LOG" | grep -E "^- feat" || echo "none"
            echo "### Fixes"
            echo "$LOG" | grep -E "^- fix" || echo "none"
            echo "### Performance"
            echo "$LOG" | grep -E "^- perf" || echo "none"
          } > changelog.md
          cat changelog.md
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          cat changelog.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: GitHub Release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          FLAG=""
          [[ "${{ inputs.channel }}" != "release" ]] && FLAG="--prerelease"
          gh release create v${{ inputs.version }} build/libs/vectorial-*.jar \
            --title "v${{ inputs.version }}" --notes-file changelog.md $FLAG

      - name: Publish to GitHub Packages
        run: ./gradlew publish -Pmod_version=${{ inputs.version }} --no-daemon

      - name: Modrinth Release
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: cV2wvHTR
          version: ${{ inputs.version }}
          loaders: '["fabric", "neoforge"]'
          game-versions: "26.2"
          changelog: ${{ steps.changelog.outputs.changelog }}
          channel: ${{ inputs.channel }}
          files: build/libs/vectorial-${{ inputs.version }}.jar
          dependencies: |-
            []
