name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: false
        type: choice
        default: "release"
        options:
          - release
          - beta
          - alpha

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 26
        run: |
          curl -sL "https://github.com/adoptium/temurin26-binaries/releases/download/jdk-26.0.1%2B8/OpenJDK26U-jdk_x64_linux_hotspot_26.0.1_8.tar.gz" -o /tmp/jdk26.tar.gz
          sudo mkdir -p /opt/jdk26 && sudo tar -xzf /tmp/jdk26.tar.gz -C /opt/jdk26 --strip-components=1
          echo "JAVA_HOME=/opt/jdk26" >> $GITHUB_ENV
          echo "/opt/jdk26/bin" >> $GITHUB_PATH

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -Pmod_version=${{ inputs.version }}

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
          else
            CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %s" --reverse)
          fi
          {
            echo "### ✨ 新功能"
            echo "$CHANGELOG" | grep -E "^- feat(\(.*\))?:" || echo "无"
            echo ""
            echo "### 🐛 修复"
            echo "$CHANGELOG" | grep -E "^- fix(\(.*\))?:" || echo "无"
            echo ""
            echo "### 📝 文档"
            echo "$CHANGELOG" | grep -E "^- docs(\(.*\))?:" || echo "无"
            echo ""
            echo "### ♻️ 重构 / 代码风格"
            echo "$CHANGELOG" | grep -E "^- refactor(\(.*\))?:" || echo "无"
            echo "$CHANGELOG" | grep -E "^- style(\(.*\))?:" || echo "无"
            echo ""
            echo "### 🧪 测试"
            echo "$CHANGELOG" | grep -E "^- test(\(.*\))?:" || echo "无"
            echo ""
            echo "### 🔧 构建 / 杂项"
            echo "$CHANGELOG" | grep -E "^- ci(\(.*\))?:" || echo "无"
            echo "$CHANGELOG" | grep -E "^- chore(\(.*\))?:" || echo "无"
            echo ""
            echo "### ⚡ 性能优化"
            echo "$CHANGELOG" | grep -E "^- perf(\(.*\))?:" || echo "无"
            echo ""
            echo "### 🚨 破坏性变更"
            echo "$CHANGELOG" | grep -E "!:" || echo "无"
          } > changelog.md
          cat changelog.md
          {
            echo "changelog<<EOF"
            cat changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: Build sources JAR
        run: ./gradlew :fabric:sourcesJar :neoforge:sourcesJar -Pmod_version=${{ inputs.version }}

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRE_RELEASE_FLAG=""
          if [[ "${{ inputs.channel }}" == "beta" ]] || [[ "${{ inputs.channel }}" == "alpha" ]]; then
            PRE_RELEASE_FLAG="--prerelease"
          fi
          gh release create v${{ inputs.version }} \
            build/libs/hopper-parallelization-*.jar \
            --title "v${{ inputs.version }}" \
            --notes-file changelog.md \
            $PRE_RELEASE_FLAG

      - name: Verify artifacts
        run: |
          echo "=== Fabric JARs ==="
          ls -la build/libs/

      - name: Modrinth Release
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: BVCCoDMw
          version: ${{ inputs.version }}
          loaders: '["fabric", "neoforge"]'
          game-versions: "26.2"
          changelog: ${{ steps.changelog.outputs.changelog }}
          channel: ${{ inputs.channel }}
          files: build/libs/hopper-parallelization-${{ inputs.version }}.jar
          dependencies: |-
            [
              {
                "project_id": "xTzfQxjv",
                "dependency_type": "required"
              },
              {
                "project_id": "cV2wvHTR",
                "dependency_type": "optional"
              }
            ]
